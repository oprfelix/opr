proxy-groups:
  - name: CDN-AUTO
    type: url-test
    proxies:
      - CDN-1
      - CDN-2
      - CDN-3
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: LLM-AUTO
    type: url-test
    proxies:
      - LLM-US
      - LLM-DE
      - LLM-ETH
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

