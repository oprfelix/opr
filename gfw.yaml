mixed-port: 2080
bind-address: 127.0.0.1
allow-lan: false
mode: rule
log-level: warning
external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
secret: ""

ipv6: true
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

tun:
  enable: true
  stack: system
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53

ntp:
  enable: true
  write-to-system: false
  server: time.apple.com
  port: 123
  interval: 30

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "time.apple.com"
  default-nameserver:
    - 223.5.5.5
  proxy-server-nameserver:
    - 223.5.5.5
    - https://dns.alidns.com/dns-query
  nameserver:
    - "https://dns.alidns.com/dns-query#DIRECT"
  fallback:
    - "https://8.8.8.8/dns-query#PROXY"
  fallback-filter:
    geoip: true
    geoip-code: CN
    domain:
      - "+.claude.ai"
      - "+.anthropic.com"
      - "+.anthropic.ai"
      - "+.claude.com"
      - "+.chatgpt.com"
      - "+.openai.com"
      - "+.oaistatic.com"
      - "+.oaiusercontent.com"
      - "+.x.ai"
      - "+.grok.com"
      - "+.perplexity.ai"
      - "+.google.com"
      - "+.googleapis.com"
      - "+.gstatic.com"
      - "+.youtube.com"
      - "+.github.com"
      - "+.telegram.org"
      - "+.facebook.com"
      - "+.twitter.com"
      - "+.x.com"
      - "+.discord.com"

