  - DOMAIN-SUFFIX,grok.x.ai,LLM-AUTO
  - DOMAIN-SUFFIX,perplexity.ai,LLM-AUTO

  # YouTube 关键字
  - DOMAIN-KEYWORD,youtube,CDN-AUTO
  - DOMAIN-KEYWORD,ytimg,CDN-AUTO
  - DOMAIN-KEYWORD,ggpht,CDN-AUTO
  - DOMAIN-KEYWORD,googlevideo,CDN-AUTO

  # 绕过中国大陆网站与IP
  - GEOSITE,cn,DIRECT
  - GEOSITE,geolocation-!cn,CDN-AUTO
