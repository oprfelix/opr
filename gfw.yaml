# Migrated from sing-box JSON to Mihomo / Clash Meta YAML.
# Source file: 1.11.4.json
# Notes:
# - sing-box route.rule_set .srs files were replaced with Mihomo-compatible mrs rule-providers.
# - The source credentials are copied into this file; keep it private.
# - YAML syntax has been checked with PyYAML; runtime validation should be done with your actual mihomo core/client.
mixed-port: 2080
allow-lan: false
bind-address: 127.0.0.1
mode: rule
log-level: warning
ipv6: false
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome
external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-url: https://github.com/Zephyruso/zashboard/archive/gh-pages.zip
secret: ''
profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  override-destination: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
  - any:53
  - tcp://any:53
  strict-route: true
  mtu: 1500
  inet4-address:
  - 172.19.0.1/30
  auto-redirect: false
dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
  - 223.5.5.5
  proxy-server-nameserver:
  - 223.5.5.5
  nameserver:
  - https://dns.google/dns-query
  direct-nameserver:
  - https://dns.alidns.com/dns-query
  direct-nameserver-follow-policy: true
  nameserver-policy:
    +.todsm.com: https://dns.alidns.com/dns-query
    +.hayoovant.com: https://dns.alidns.com/dns-query
    +.fotoman.com: https://dns.alidns.com/dns-query
    rule-set:cn_domain: https://dns.alidns.com/dns-query
