proxy-groups:
  - name: "CDN-AUTO"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    proxies:
      - "CDN-1"
      - "CDN-2"
      - "CDN-3"

  - name: "LLM-AUTO"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    proxies:
      - "LLM-US-HYSTERIA2"
      - "LLM-DE-HYSTERIA2"

rules:
  # 局域网直连
  - GEOIP,lan,DIRECT,no-resolve

  # 自定义直连域名
  - DOMAIN-SUFFIX,todsm.com,DIRECT
  - DOMAIN-SUFFIX,hayoovant.com,DIRECT
  - DOMAIN-SUFFIX,fotoman.com,DIRECT
  - DOMAIN-SUFFIX,jsdelivr.net,DIRECT
  - DOMAIN-SUFFIX,gstatic.com,DIRECT

  # LLM 关键字与域名
  - DOMAIN-KEYWORD,openai,LLM-AUTO
  - DOMAIN-KEYWORD,chatgpt,LLM-AUTO
  - DOMAIN-KEYWORD,perplexity,LLM-AUTO
  - DOMAIN-KEYWORD,grok,LLM-AUTO
  - DOMAIN-KEYWORD,claude,LLM-AUTO
  - DOMAIN-KEYWORD,anthropic,LLM-AUTO
  - DOMAIN-KEYWORD,gemini,LLM-AUTO
  - DOMAIN-KEYWORD,copilot,LLM-AUTO
  - DOMAIN-SUFFIX,claude.ai,LLM-AUTO
  - DOMAIN-SUFFIX,anthropic.com,LLM-AUTO
  - DOMAIN-SUFFIX,anthropic.ai,LLM-AUTO
  - DOMAIN-SUFFIX,claude.com,LLM-AUTO
  - DOMAIN-SUFFIX,chatgpt.com,LLM-AUTO
  - DOMAIN-SUFFIX,openai.com,LLM-AUTO
  - DOMAIN-SUFFIX,oaistatic.com,LLM-AUTO
  - DOMAIN-SUFFIX,oaiusercontent.com,LLM-AUTO
  - DOMAIN-SUFFIX,openaiapi-site.azureedge.net,LLM-AUTO
  - DOMAIN-SUFFIX,auth0.openai.com,LLM-AUTO
  - DOMAIN-SUFFIX,x.ai,LLM-AUTO
