proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - CDN-AUTO
      - CDN-1
      - CDN-2
      - CDN-3

  - name: "CDN-AUTO"
    type: url-test
    proxies:
      - CDN-1
      - CDN-2
      - CDN-3
    url: https://www.gstatic.com/generate_204
    expected-status: 204
    interval: 600
    tolerance: 100
    lazy: true
    timeout: 5000

  - name: "LLM"
    type: select
    proxies:
      - LLM-AUTO
      - LLM-US-REALITY
      - LLM-DE-VLESS

  - name: "LLM-AUTO"
    type: url-test
    proxies:
      - LLM-US-REALITY
      - LLM-DE-VLESS
    url: https://www.gstatic.com/generate_204
    expected-status: 204
    interval: 600
    tolerance: 100
    lazy: true
    timeout: 5000

