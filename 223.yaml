# ---------------- Proxy Groups ----------------
proxy-groups:

- name: CDN
  type: url-test
  url: https://www.google.com/generate_204
  interval: 600
  tolerance: 50
  proxies:
    - Alpha
    - Delta
    - Gamma

- name: LLM
  type: url-test
  url: https://www.google.com/generate_204
  interval: 600
  tolerance: 50
  proxies:
    - LLM1
    - LLM2

# ---------------- Rules ----------------
rules:
# Google Translate
- DOMAIN-SUFFIX,translate.google.com,LLM2
- DOMAIN-SUFFIX,translate.googleapis.com,LLM2
