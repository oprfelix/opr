mixed-port: 7890
allow-lan: true
bind-address: 0.0.0.0
mode: rule
log-level: error
ipv6: false
external-controller: 127.0.0.1:9090
secret: a1927b089fc365a3
unified-delay: true

profile:
  store-selected: true
  store-fake-ip: true

tcp-concurrent: true
global-client-fingerprint: chrome

# ---------------- DNS ----------------
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 172.19.0.1/16

  nameserver:
    - 223.5.5.5
  fallback-filter:
    geoip: true
    geoip-code: CN

# ---------------- Proxies ----------------
proxies:

- name: Alpha
  type: vless
  server: 192.168.1.1
  port: 443
  uuid: 351r3c90-7fef-4fr0-bccc-vee0bn0ca151
  network: ws
  tls: true
  servername: google.com
  client-fingerprint: chrome
  ws-opts:
    path: /
    headers:
      Host: gogole.com



# ---------------- Rules ----------------
rules:
# CN IP
- GEOIP,CN,DIRECT

# 默认
- MATCH,CDN
