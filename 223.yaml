mixed-port: 7890
allow-lan: true
bind-address: 0.0.0.0
mode: rule
log-level: error
ipv6: false
external-controller: 127.0.0.1:9090
secret: a1927b089fc365a3
unified-delay: true

profile:
  store-selected: true
  store-fake-ip: true

tcp-concurrent: true
global-client-fingerprint: chrome

# ---------------- DNS ----------------
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 172.19.0.1/16

  nameserver:  # 主 DNS 服务器列表
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
    - 8.8.4.4
    - 1.0.0.1
    - 1.1.1.1
    - tls://223.5.5.5:853
    - tls://8.8.8.8
    - tls://8.8.4.4
    - tls://1.0.0.1
    - tls://1.1.1.1
    - https://dns.alidns.com/dns-query#h3=true
    - https://mozilla.cloudflare-dns.com/dns-query#DNS&h3=true
    - quic://dns.adguard.com:784
    - system

  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN

# ---------------- TUN ----------------
tun:
  enable: true
  stack: gVisor
  auto-route: true
  dns-hijack:
    - any:53
  mtu: 1500

# ---------------- Proxies ----------------
