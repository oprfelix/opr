# ================================================================
# 代理组
# CDN：自动选速最快的 CDN 节点（Alpha/Delta/Gamma）
# LLM：自动选速最快的 LLM 节点（LLM1/LLM2），用于 AI 服务
# 说明：interval=600 每10分钟测速一次，tolerance=50 延迟差50ms内不切换
# ================================================================
proxy-groups:

- name: CDN
  type: url-test
  url: https://www.google.com/generate_204
  interval: 600
  tolerance: 50
  proxies:
    - Alpha
    - Delta
    - Gamma

- name: LLM
  type: url-test
  url: https://www.google.com/generate_204
  interval: 600
  tolerance: 50
  proxies:
    - LLM1
    - LLM2
 #   - LLM3                           # 备用，需要时取消注释

# ================================================================
# 规则匹配顺序说明：
# 1. 直连白名单（最高优先级，防止被后面 IP 段误匹配）
# 2. 直连域名关键词（国内 APP / 电商工具）
# 3. 直连 IP 段（国内运营商 / 云厂商）
# 4. 代理域名规则（各 AI 服务 / 工具）
# 5. 代理 IP 段（各服务自有 IP）
# 6. GEOSITE / GEOIP 兜底
# 7. MATCH 默认出口
# ================================================================
rules:

# ----------------------------------------------------------------
# 直连白名单（优先级最高）
# 说明：本地可直接访问，无需代理；放最前防止被 Cloudflare IP 段误匹配
# ----------------------------------------------------------------
- DOMAIN-SUFFIX,challenges.cloudflare.com,DIRECT

# ----------------------------------------------------------------
# 电商工具
# 直连：helium10 / shopline / semrush / amazon 等
# 代理：fiverr / referazon（需要境外访问）
# ----------------------------------------------------------------
- DOMAIN-KEYWORD,helium10,DIRECT
- DOMAIN-KEYWORD,myshopline,DIRECT
- DOMAIN-KEYWORD,shopline,DIRECT
- DOMAIN-KEYWORD,Sortime,DIRECT
- DOMAIN-KEYWORD,semrush,DIRECT
- DOMAIN-KEYWORD,quanmaitong,DIRECT
- DOMAIN-KEYWORD,amazon,DIRECT
- DOMAIN-KEYWORD,fiverr,LLM3
- DOMAIN-KEYWORD,referazon,LLM3

