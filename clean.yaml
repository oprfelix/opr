mixed-port: 7890
allow-lan: true
bind-address: 0.0.0.0
mode: rule
log-level: error
ipv6: false
external-controller: 127.0.0.1:9090
secret: a1927b089fc365a3
unified-delay: true

profile:
  store-selected: true
  store-fake-ip: true

tcp-concurrent: true
global-client-fingerprint: chrome

# ================================================================
# DNS 配置
# ================================================================
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 172.19.0.0/16

  fake-ip-filter:
    - "*.lan"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - localhost.ptlogin2.qq.com

  nameserver:
    - 1.1.1.1      # Cloudflare
    - 223.5.5.5    # 阿里云 DNS

  fallback:
    - https://1.0.0.1/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/8

# ================================================================
# TUN 模式
# ================================================================
tun:
  enable: true
  stack: system
  auto-route: true
  dns-hijack:
    - any:53
  mtu: 1500

