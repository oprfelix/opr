mixed-port: 10808
allow-lan: false
bind-address: 127.0.0.1
mode: rule
log-level: warning
ipv6: true

# Clash API (对应 configPre.json 的 clash_api)
external-controller: 127.0.0.1:10814

# TUN 模式 (对应 configPre.json 的 tun-in inbound)
tun:
  enable: true
  stack: gvisor
  device: utun65
  mtu: 9000
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

# DNS 配置 (对应 configPre.json 的 dns 段)
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com
  # 对应 hosts_dns 的 predefined 静态解析
  hosts:
    dns.google: [8.8.8.8, 8.8.4.4]
    dns.alidns.com: [223.5.5.5, 223.6.6.6]
    cloudflare-dns.com: [104.16.249.249, 104.16.248.249]
    one.one.one.one: [1.1.1.1, 1.0.0.1]
    dns.quad9.net: [9.9.9.9, 149.112.112.112]
    dot.pub: [1.12.12.12, 120.53.53.53]
    doh.pub: [1.12.12.12, 120.53.53.53]
  nameserver:
    # direct_dns → 阿里 DoH (对应 configPre.json direct_dns)
    - https://dns.alidns.com/dns-query
  fallback:
    # remote_dns → Cloudflare DoH，走代理 (对应 configPre.json remote_dns)
    - https://cloudflare-dns.com/dns-query#proxy
  fallback-filter:
    geoip: true
    geoip-code: CN
    domain:
      - cloudflare-dns.com
      - one.one.one.one
      - dns.google
      - adguard-dns.com
      - opendns.com
      - umbrella.com
      - quad9.net
      - yandex.net
      - api.ip.sb
  nameserver-policy:
    # GFW / greatfire 走远程 DNS
    "geosite:gfw,greatfire": "https://cloudflare-dns.com/dns-query#proxy"
    "geosite:google": "https://cloudflare-dns.com/dns-query#proxy"
    # 私有地址走本地 DNS
    "geosite:private": "https://dns.alidns.com/dns-query"

# ===== 代理节点 (仅保留 8.35.211.x 段) =====
proxies:
  - name: "Zeus"
    type: vless
    server: 8.35.211.251
    port: 443
    uuid: 723f6692-87a0-4a59-848d-8112b4e0db5b
    network: ws
    tls: true
    servername: ddns.hayoovant.com
    client-fingerprint: chrome
    ws-opts:
      path: /
      headers:
        Host: ddns.hayoovant.com

  - name: "Athena"
    type: vless
    server: 8.35.211.202
    port: 443
    uuid: 723f6692-87a0-4a59-848d-8112b4e0db5b
    network: ws
    tls: true
    servername: ddns.hayoovant.com
    client-fingerprint: chrome
    ws-opts:
      path: /
      headers:
        Host: ddns.hayoovant.com

  - name: "Apollo"
    type: vless
    server: 8.35.211.106
    port: 443
    uuid: 723f6692-87a0-4a59-848d-8112b4e0db5b
    network: ws
    tls: true
    servername: ddns.hayoovant.com
    client-fingerprint: chrome
    ws-opts:
      path: /
      headers:
        Host: ddns.hayoovant.com

  - name: "Hermes"
    type: vless
    server: 8.35.211.102
    port: 443
    uuid: 723f6692-87a0-4a59-848d-8112b4e0db5b
    network: ws
    tls: true
    servername: ddns.hayoovant.com
    client-fingerprint: chrome
    ws-opts:
      path: /
      headers:
        Host: ddns.hayoovant.com



# ===== 代理组 =====
proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - Auto-Best
      - Zeus
      - Athena
      - Apollo
      - Hermes
      - DIRECT

  - name: "Auto-Best"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - Zeus
      - Athena
      - Apollo
      - Hermes

# ===== 路由规则 =====
# 严格对应 configPre.json 的 route.rules 顺序
rules:
  # 1. 防止代理进程流量回环 (对应 process_name outbound:direct)
  - PROCESS-NAME,v2ray,DIRECT
  - PROCESS-NAME,xray,DIRECT
  - PROCESS-NAME,mihomo,DIRECT
  - PROCESS-NAME,clash,DIRECT
  - PROCESS-NAME,sing-box,DIRECT
  - PROCESS-NAME,hysteria,DIRECT
  - PROCESS-NAME,naive,DIRECT
  - PROCESS-NAME,naiveproxy,DIRECT
  - PROCESS-NAME,tuic-client,DIRECT
  - PROCESS-NAME,tuic,DIRECT
  - PROCESS-NAME,juicity-client,DIRECT
  - PROCESS-NAME,juicity,DIRECT
  - PROCESS-NAME,brook,DIRECT
  - PROCESS-NAME,overtls,DIRECT
  - PROCESS-NAME,shadowquic,DIRECT
  - PROCESS-NAME,mieru,DIRECT

  # 2. 拒绝 UDP/443 (QUIC) (对应 network:udp port:443 action:reject)
  - AND,((NETWORK,udp),(DST-PORT,443)),REJECT

  # 3. 代理 api.ip.sb
  - DOMAIN-KEYWORD,api.ip.sb,PROXY

  # 4. Google 走代理
  - GEOSITE,google,PROXY

  # 5. 私有地址直连
  - GEOIP,private,DIRECT,no-resolve
  - GEOSITE,private,DIRECT

  # 6. 已知 DNS 服务器 IP 走代理
  - IP-CIDR,1.1.1.1/32,PROXY,no-resolve
  - IP-CIDR,1.0.0.1/32,PROXY,no-resolve
  - IP-CIDR,8.8.8.8/32,PROXY,no-resolve
  - IP-CIDR,8.8.4.4/32,PROXY,no-resolve
  - IP-CIDR,9.9.9.9/32,PROXY,no-resolve
  - IP-CIDR,149.112.112.112/32,PROXY,no-resolve
  - IP-CIDR,208.67.222.222/32,PROXY,no-resolve
  - IP-CIDR,208.67.220.220/32,PROXY,no-resolve
  - IP-CIDR,94.140.14.14/32,PROXY,no-resolve
  - IP-CIDR,94.140.15.15/32,PROXY,no-resolve
  - IP-CIDR,77.88.8.8/32,PROXY,no-resolve
  - IP-CIDR,77.88.8.1/32,PROXY,no-resolve
  - IP-CIDR6,2606:4700:4700::1111/128,PROXY,no-resolve
  - IP-CIDR6,2606:4700:4700::1001/128,PROXY,no-resolve
  - IP-CIDR6,2001:4860:4860::8888/128,PROXY,no-resolve
  - IP-CIDR6,2001:4860:4860::8844/128,PROXY,no-resolve

  # 7. 知名 DNS 域名走代理
  - DOMAIN-SUFFIX,cloudflare-dns.com,PROXY
  - DOMAIN-SUFFIX,one.one.one.one,PROXY
  - DOMAIN-SUFFIX,dns.google,PROXY
  - DOMAIN-SUFFIX,adguard-dns.com,PROXY
  - DOMAIN-SUFFIX,opendns.com,PROXY
  - DOMAIN-SUFFIX,umbrella.com,PROXY
  - DOMAIN-SUFFIX,quad9.net,PROXY
  - DOMAIN-SUFFIX,yandex.net,PROXY

  # 8. 主要境外 IP 段走代理
  - GEOIP,facebook,PROXY,no-resolve
  - GEOIP,google,PROXY,no-resolve
  - GEOIP,netflix,PROXY,no-resolve
  - GEOIP,telegram,PROXY,no-resolve
  - GEOIP,twitter,PROXY,no-resolve

  # 9. GFW / greatfire 走代理
  - GEOSITE,gfw,PROXY
  - GEOSITE,greatfire,PROXY

  # 10. BT 直连 (对应 protocol:bittorrent outbound:direct)
  - GEOSITE,category-ads-all,REJECT

  # 11. 兜底：全部走代理 (对应 configPre.json route.final: proxy)
  - MATCH,PROXY
