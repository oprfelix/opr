# ===== 代理组 =====

proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - Auto-Best
      - Zeus
      - Athena
      - Apollo
      - Hermes
      - Dionysus
      - Artemis
      - DIRECT

  - name: "Auto-Best"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - Zeus
      - Athena
      - Apollo
      - Hermes
      - Dionysus
      - Artemis

  # JUN 专用组，供 Claude 使用
  - name: "Claude-JUN"
    type: select
    proxies:
      - JUN
      - Auto-Best

  - name: "Olympus-Reserve"
    type: select
    proxies:
      - REJECT
      - JUN
      - ETHERNET
      - AWSP

# ===== 路由规则 =====

rules:
  # Claude 网络请求走 JUN 节点
  - PROCESS-NAME,Claude,Claude-JUN

  # Claude Cowork 本地虚拟机直连
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve

  # 防止代理进程流量回环
  - PROCESS-NAME,v2ray,DIRECT
  - PROCESS-NAME,xray,DIRECT
  - PROCESS-NAME,mihomo,DIRECT
  - PROCESS-NAME,clash,DIRECT
  - PROCESS-NAME,sing-box,DIRECT
  - PROCESS-NAME,hysteria,DIRECT
  - PROCESS-NAME,naive,DIRECT
  - PROCESS-NAME,naiveproxy,DIRECT
  - PROCESS-NAME,tuic-client,DIRECT
  - PROCESS-NAME,tuic,DIRECT
  - PROCESS-NAME,juicity-client,DIRECT
  - PROCESS-NAME,juicity,DIRECT
  - PROCESS-NAME,brook,DIRECT
  - PROCESS-NAME,overtls,DIRECT
  - PROCESS-NAME,shadowquic,DIRECT
  - PROCESS-NAME,mieru,DIRECT

  # 屏蔽 UDP/443 (QUIC)
  - AND,((NETWORK,udp),(DST-PORT,443)),REJECT

  # 代理出口 IP 查询
  - DOMAIN-KEYWORD,api.ip.sb,PROXY

  # Google 服务走代理
  - GEOSITE,google,PROXY

  # 私有地址直连
  - GEOIP,private,DIRECT,no-resolve
  - GEOSITE,private,DIRECT

  # 知名 DNS 服务器 IP 走代理
  - IP-CIDR,1.1.1.1/32,PROXY,no-resolve
  - IP-CIDR,1.0.0.1/32,PROXY,no-resolve
  - IP-CIDR,8.8.8.8/32,PROXY,no-resolve
  - IP-CIDR,8.8.4.4/32,PROXY,no-resolve
  - IP-CIDR,9.9.9.9/32,PROXY,no-resolve
  - IP-CIDR,149.112.112.112/32,PROXY,no-resolve
  - IP-CIDR,208.67.222.222/32,PROXY,no-resolve
  - IP-CIDR,208.67.220.220/32,PROXY,no-resolve
  - IP-CIDR,94.140.14.14/32,PROXY,no-resolve
  - IP-CIDR,94.140.15.15/32,PROXY,no-resolve
  - IP-CIDR,77.88.8.8/32,PROXY,no-resolve
  - IP-CIDR,77.88.8.1/32,PROXY,no-resolve
  - IP-CIDR6,2606:4700:4700::1111/128,PROXY,no-resolve
  - IP-CIDR6,2606:4700:4700::1001/128,PROXY,no-resolve
  - IP-CIDR6,2001:4860:4860::8888/128,PROXY,no-resolve
  - IP-CIDR6,2001:4860:4860::8844/128,PROXY,no-resolve

  # 知名 DNS 服务域名走代理
  - DOMAIN-SUFFIX,cloudflare-dns.com,PROXY
  - DOMAIN-SUFFIX,one.one.one.one,PROXY
  - DOMAIN-SUFFIX,dns.google,PROXY
  - DOMAIN-SUFFIX,adguard-dns.com,PROXY
  - DOMAIN-SUFFIX,opendns.com,PROXY
  - DOMAIN-SUFFIX,umbrella.com,PROXY
  - DOMAIN-SUFFIX,quad9.net,PROXY
  - DOMAIN-SUFFIX,yandex.net,PROXY

  # 主要境外平台 IP 走代理
  - GEOIP,facebook,PROXY,no-resolve
  - GEOIP,google,PROXY,no-resolve
  - GEOIP,netflix,PROXY,no-resolve
  - GEOIP,telegram,PROXY,no-resolve
  - GEOIP,twitter,PROXY,no-resolve

  # GFW / greatfire 名单走代理
