mixed-port: 10808
allow-lan: false
bind-address: 127.0.0.1
mode: rule
log-level: warning
ipv6: true

# Clash 外部控制接口
external-controller: 127.0.0.1:10814

# TUN 透明代理
tun:
  enable: true
  stack: gvisor
  device: utun65
  mtu: 9000
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

# DNS
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com

  hosts:
    dns.google: [8.8.8.8, 8.8.4.4]
    dns.alidns.com: [223.5.5.5, 223.6.6.6]
    cloudflare-dns.com: [104.16.249.249, 104.16.248.249]
    one.one.one.one: [1.1.1.1, 1.0.0.1]
    dns.quad9.net: [9.9.9.9, 149.112.112.112]
    dot.pub: [1.12.12.12, 120.53.53.53]
    doh.pub: [1.12.12.12, 120.53.53.53]

  nameserver:
    - https://dns.alidns.com/dns-query

  fallback:
    - https://cloudflare-dns.com/dns-query#proxy

  fallback-filter:
    geoip: true
    geoip-code: CN
    domain:
      - cloudflare-dns.com
      - one.one.one.one
      - dns.google
      - adguard-dns.com
      - opendns.com
      - umbrella.com
      - quad9.net
      - yandex.net
      - api.ip.sb

  nameserver-policy:
    "geosite:gfw,greatfire": "https://cloudflare-dns.com/dns-query#proxy"
    "geosite:google": "https://cloudflare-dns.com/dns-query#proxy"
    "geosite:private": "https://dns.alidns.com/dns-query"

